services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db/00-auth-schema.sql:/docker-entrypoint-initdb.d/00-auth-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  gotrue:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "8080"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable&search_path=auth"
      GOTRUE_SITE_URL: "${SITE_URL}"
      API_EXTERNAL_URL: "${SITE_URL}/auth/v1"
      GOTRUE_JWT_SECRET: "${JWT_SECRET}"
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_AUD: "authenticated"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: "authenticated"
      GOTRUE_JWT_ADMIN_ROLES: "service_role"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "${MAILER_AUTOCONFIRM:-true}"
      GOTRUE_SMTP_HOST: "${SMTP_HOST:-}"
      GOTRUE_SMTP_PORT: "${SMTP_PORT:-465}"
      GOTRUE_SMTP_USER: "${SMTP_USER:-}"
      GOTRUE_SMTP_PASS: "${SMTP_PASS:-}"
      GOTRUE_SMTP_ADMIN_EMAIL: "${SMTP_FROM:-noreply@example.com}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  init-db:
    image: postgres:17-alpine
    depends_on:
      gotrue:
        condition: service_healthy
    volumes:
      - ./init-db/01-forum-tables.sql:/01-forum-tables.sql:ro
      - ./init-db/02-forum-triggers.sql:/02-forum-triggers.sql:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      sh -c "
        psql -h postgres -U postgres -d postgres -f /01-forum-tables.sql &&
        psql -h postgres -U postgres -d postgres -f /02-forum-triggers.sql &&
        echo 'DB init complete!'
      "

  forum:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gotrue:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
      GOTRUE_URL: "http://gotrue:8080"
      JWT_SECRET: "${JWT_SECRET}"
      GOTRUE_SERVICE_ROLE_KEY: "${GOTRUE_SERVICE_ROLE_KEY}"
      FORUM_DOMAIN: "${FORUM_DOMAIN}"
      FORUM_NAME: "${FORUM_NAME:-My Forum}"
      VITE_SITE_URL: "${SITE_URL}"
      CORS_ALLOWED_ORIGINS: "${SITE_URL}"
      # Forumline integration (optional)
      FORUMLINE_APP_URL: "${FORUMLINE_APP_URL:-}"
      FORUMLINE_CLIENT_ID: "${FORUMLINE_CLIENT_ID:-}"
      FORUMLINE_CLIENT_SECRET: "${FORUMLINE_CLIENT_SECRET:-}"
      FORUMLINE_JWT_SECRET: "${FORUMLINE_JWT_SECRET:-}"
      FORUMLINE_GOTRUE_URL: "${FORUMLINE_GOTRUE_URL:-}"
      FORUMLINE_SERVICE_ROLE_KEY: "${FORUMLINE_SERVICE_ROLE_KEY:-}"
      # LiveKit voice rooms (optional)
      LIVEKIT_URL: "${LIVEKIT_URL:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      # Cloudflare R2 avatar storage (optional)
      R2_ACCOUNT_ID: "${R2_ACCOUNT_ID:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME:-}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL:-}"
    ports:
      - "${HOST_PORT:-3000}:3000"

volumes:
  postgres-data:
